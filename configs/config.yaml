project:
  name: video-rag-research

data:
  materials_dir: ./lera_materials
  prepared_videos_dir: ./data/videos
  artifacts_dir: ./data/artifacts
  qdrant_dir: ./data/qdrant

runtime:
  device: auto
  torch_dtype: auto
  enable_mps_fallback: true
  mps_high_watermark_ratio: 0.95
  mps_low_watermark_ratio: 0.90

query_decoupler:
  enabled: true
  backend: gemini
  model: Qwen/Qwen3-0.6B
  max_new_tokens: 192

gemini:
  api_keys: []
  model_names:
    - gemini-3-flash-preview
    - gemini-3.1-flash-lite-preview
    - gemini-2.5-flash
  query_model_names: []
  temperature: 0.2
  max_output_tokens: 1024
  timeout_sec: 120
  minimize_thinking: true
  flash_thinking_level: minimal
  flash_25_thinking_budget: 0

asr:
  enabled: true
  backend: whisper
  model: small
  language: ru
  no_speech_threshold: 0.6

ocr:
  enabled: true
  languages: [ru, en]
  frame_step_sec: 5.0
  min_confidence: 0.3

det:
  enabled: true
  model: Salesforce/blip-image-captioning-base
  frame_step_sec: 5.0
  max_new_tokens: 60
  # BLIP генерирует английские описания кадров; spaCy используется только для DET scene graph.
  spacy_model: en_core_web_sm

indexing:
  collection_prefix: video_rag_research
  embedding_backend: tei
  embedding_model: Qwen/Qwen3-Embedding-0.6B
  embedding_dim: 1024
  embedding_max_length: 2048
  tei_endpoint: http://127.0.0.1:8080
  tei_timeout_sec: 120
  batch_size: 8
  qdrant_host: localhost
  qdrant_port: 6333
  qdrant_path: ./data/qdrant

search:
  per_modality_top_k: 12
  final_top_k: 5
  merge_gap_sec: 6.0
  score_threshold: 0.3
  modality_weights:
    asr: 1.0
    ocr: 0.8
    det: 0.7

answering:
  enabled: true
  provider: gemini
  max_context_candidates: 5
  max_video_candidates: 1
  window_padding_sec: 2.0
  video_fps: 1.0
  cleanup_uploaded_files: true
